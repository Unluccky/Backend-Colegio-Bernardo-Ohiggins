spring.application.name=api-gateway
server.port=9090

# ── Servicio Académico ────────────────────────────────────────
spring.cloud.gateway.server.webmvc.routes[0].id=servicio-academico
spring.cloud.gateway.server.webmvc.routes[0].uri=http://servicio-academico:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/academico/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=StripPrefix=1

# ── Servicio Asistencia ───────────────────────────────────────
spring.cloud.gateway.server.webmvc.routes[1].id=servicio-asistencia
spring.cloud.gateway.server.webmvc.routes[1].uri=http://servicio-asistencia:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/asistencia/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=StripPrefix=1

# ── Servicio Comunicaciones ───────────────────────────────────
spring.cloud.gateway.server.webmvc.routes[2].id=servicio-comunicaciones
spring.cloud.gateway.server.webmvc.routes[2].uri=http://servicio-comunicaciones:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/comunicaciones/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=StripPrefix=1

# JWT
jwt.secret=colegio-bernardo-ohiggins-secret-key-2025-fullstack-iii

# URL del Servicio Académico (para validar credenciales de PROFESOR, ALUMNO, APODERADO)
academico.service.url=${ACADEMICO_SERVICE_URL:http://servicio-academico:8081}

# ── Resilience4J / Circuit Breaker ─────────────────────────────────
# Configuración por defecto para todos los Circuit Breakers
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true

# ── cb-auth-academico (autenticación remota) ──────────────────────
resilience4j.circuitbreaker.instances.auth-academico.sliding-window-size=10
resilience4j.circuitbreaker.instances.auth-academico.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.auth-academico.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.auth-academico.wait-duration-in-open-state=15s
resilience4j.circuitbreaker.instances.auth-academico.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.auth-academico.automatic-transition-from-open-to-half-open-enabled=true

# TimeLimiter: evita que una llamada se cuelgue más de 5s (coincide con el timeout del RestTemplate)
resilience4j.timelimiter.configs.default.timeout-duration=5s

# ── Springdoc / Swagger ─────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
server.forwarded-headers-strategy=framework

# Agregación de Swagger: muestra todos los microservicios en un solo Swagger UI
springdoc.swagger-ui.urls[0].name=API Gateway
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=Servicio Académico
springdoc.swagger-ui.urls[1].url=/academico/v3/api-docs
springdoc.swagger-ui.urls[2].name=Servicio Asistencia
springdoc.swagger-ui.urls[2].url=/asistencia/v3/api-docs
springdoc.swagger-ui.urls[3].name=Servicio Comunicaciones
springdoc.swagger-ui.urls[3].url=/comunicaciones/v3/api-docs

# Agregar header X-Forwarded-Prefix para que Springdoc genere URLs correctas detrás del Gateway
spring.cloud.gateway.x-forwarded.for-enabled=true
spring.cloud.gateway.x-forwarded.host-enabled=true
spring.cloud.gateway.x-forwarded.port-enabled=true
spring.cloud.gateway.x-forwarded.proto-enabled=true
spring.cloud.gateway.x-forwarded.prefix-enabled=true